name: Update NVD Database

on:
  schedule:
    - cron: '0 2 * * 1'  
  workflow_dispatch: 

jobs:
  update-nvd:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}

      - name: Restore NVD database cache
        uses: actions/cache/restore@v4
        id: cache-restore
        with:
          path: ${{ github.workspace }}/dc-data
          key: nvd-data-${{ runner.os }}

      - name: Download/Update NVD Database
        run: |
          mkdir -p empty-scan
          mvn -X org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DnvdApiDelay=500 \
            -DfailBuildOnCVSS=11 \
            -DdataDirectory=${{ github.workspace }}/dc-data \
            -Dscan=${{ github.workspace }}/empty-scan

      - name: Save NVD database cache
        uses: actions/cache/save@v4
        with:
          path: ${{ github.workspace }}/dc-data
          key: nvd-data-${{ runner.os }}

      - name: Compress database
        run: tar -czf nvd-database.tar.gz -C ${{ github.workspace }} dc-data

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: nvd-data-latest
          name: NVD Database Latest
          files: nvd-database.tar.gz
          body: "Updated at ${{ github.run_id }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
